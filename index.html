      useEffect(() => { document.documentElement.classList.toggle('dark', data.settings.dark_mode); }, [data.settings.dark_mode]);

      const update = (fn) => setData((d) => fn({ ...d }));
      const getLog = (dateKey) => data.logs[dateKey] || { fortresses: {}, subtasks: {}, notes: '' };

      const setFortressStatus = (dateKey, fkey, status) => {
        update((d) => {
          const log = { ...(d.logs[dateKey] || { fortresses: {}, subtasks: {}, notes: '' }) };
          log.fortresses = { ...log.fortresses };
          const cur = log.fortresses[fkey] || { status: 'not_completed', actual_minutes: 0, notes: '' };
          log.fortresses[fkey] = { ...cur, status };
          d.logs = { ...d.logs, [dateKey]: log };
          return d;
        });
      };
      const setFortressMinutes = (dateKey, fkey, minutes) => {
        update((d) => {
          const log = { ...(d.logs[dateKey] || { fortresses: {}, subtasks: {}, notes: '' }) };
          log.fortresses = { ...log.fortresses };
          const cur = log.fortresses[fkey] || { status: 'not_completed', actual_minutes: 0, notes: '' };
          log.fortresses[fkey] = { ...cur, actual_minutes: minutes };
          d.logs = { ...d.logs, [dateKey]: log };
          return d;
        });
      };
      const setFortressNotes = (dateKey, fkey, notes) => {
        update((d) => {
          const log = { ...(d.logs[dateKey] || { fortresses: {}, subtasks: {}, notes: '' }) };
          log.fortresses = { ...log.fortresses };
          const cur = log.fortresses[fkey] || { status: 'not_completed', actual_minutes: 0, notes: '' };
          log.fortresses[fkey] = { ...cur, notes };
          d.logs = { ...d.logs, [dateKey]: log };
          return d;
        });
      };
      const setSubtaskStatus = (dateKey, skey, status) => {
        update((d) => {
          const log = { ...(d.logs[dateKey] || { fortresses: {}, subtasks: {}, notes: '' }) };
          log.subtasks = { ...log.subtasks, [skey]: status };
          d.logs = { ...d.logs, [dateKey]: log };
          return d;
        });
      };
      const resetDay = (dateKey) => {
        update((d) => {
          const newLogs = { ...d.logs };
          delete newLogs[dateKey];
          d.logs = newLogs;
          return d;
        });
      };

      const prepOn = data.settings.preparation_enabled !== false;
      const activeFortresses = useMemo(
        () => FORTRESSES.filter((f) => prepOn || f.key !== 'preparation'),
        [prepOn]
      );

      const stats = useMemo(() => {
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const monthLogs = Object.entries(data.logs).filter(([k]) => k.startsWith(monthKey));
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

        const perFortress = {};
        FORTRESSES.forEach((f) => { perFortress[f.key] = { completed: 0, partial: 0, minutes: 0 }; });

        let fullDays = 0;
        monthLogs.forEach(([k, log]) => {
          const dt = new Date(k);
          const isFar = data.settings.far_review.active_days.includes(dt.getDay());
          const isRest = data.plan.rest_days.includes(dt.getDay());
          const expectedFortresses = activeFortresses.filter((f) => {
            if (f.key === 'far_review') return isFar;
            if ((f.key === 'new_memorization' || f.key === 'near_review') && isRest) return false;
            return true;
          });
          activeFortresses.forEach((f) => {
            const fl = log.fortresses[f.key];
            if (fl) {
              if (fl.status === 'completed') perFortress[f.key].completed++;
              if (fl.status === 'partial') perFortress[f.key].partial++;
              perFortress[f.key].minutes += Number(fl.actual_minutes) || 0;
            }
          });
          const expectedCompleted = expectedFortresses.filter((f) => log.fortresses[f.key]?.status === 'completed').length;
          if (expectedCompleted === expectedFortresses.length && expectedFortresses.length > 0) fullDays++;
        });

        let streak = 0;
        const d = new Date();
        while (true) {
          const k = dateKeyOf(d);
          const log = data.logs[k];
          if (!log) break;
          const isFar = data.settings.far_review.active_days.includes(d.getDay());
          const isRest = data.plan.rest_days.includes(d.getDay());
          const expected = activeFortresses.filter((f) => {
            if (f.key === 'far_review') return isFar;
            if ((f.key === 'new_memorization' || f.key === 'near_review') && isRest) return false;
            return true;
          });
          const allDone = expected.every((f) => log.fortresses[f.key]?.status === 'completed');
          if (!allDone) break;
          streak++;
          d.setDate(d.getDate() - 1);
        }

        const monthlyConsistency = Math.round((fullDays / daysInMonth) * 100);

        const weekStart = new Date();
        weekStart.setDate(weekStart.getDate() - 6);
        let weekFull = 0;
        for (let i = 0; i < 7; i++) {
          const dt = new Date(weekStart);
          dt.setDate(dt.getDate() + i);
          const k = dateKeyOf(dt);
          const log = data.logs[k];
          const isFar = data.settings.far_review.active_days.includes(dt.getDay());
          const isRest = data.plan.rest_days.includes(dt.getDay());
          const expected = activeFortresses.filter((f) => {
            if (f.key === 'far_review') return isFar;
            if ((f.key === 'new_memorization' || f.key === 'near_review') && isRest) return false;
            return true;
          });
          if (log && expected.length > 0 && expected.every((f) => log.fortresses[f.key]?.status === 'completed')) weekFull++;
        }
        const weeklyConsistency = Math.round((weekFull / 7) * 100);

        const sorted = [...activeFortresses].sort((a, b) => perFortress[b.key].completed - perFortress[a.key].completed);
        const strongest = sorted[0];
        const weakest = sorted[sorted.length - 1];

        const memorized = pagesMemorizedBy(data.plan, todayKey());
        const totalPlanPages = data.plan.end_page - data.plan.start_page + 1;
        const planProgress = Math.min(100, Math.round((memorized / totalPlanPages) * 100));
        const activeDaysPerWeek = 7 - data.plan.rest_days.length;
        const remainingPages = Math.max(0, totalPlanPages - memorized);
        const remainingDays = Math.ceil(remainingPages / data.plan.daily_pages);
        const finishDate = new Date();
        let added = 0;
        while (added < remainingDays) {
          finishDate.setDate(finishDate.getDate() + 1);
          if (!data.plan.rest_days.includes(finishDate.getDay())) added++;
        }

        return { perFortress, fullDays, daysInMonth, monthlyConsistency, weeklyConsistency, streak, strongest, weakest, memorized, totalPlanPages, planProgress, activeDaysPerWeek, finishDate };
      }, [data.logs, data.plan, data.settings.far_review.active_days, activeFortresses]);

      const todayLog = getLog(todayKey());
      const todayDate = new Date();
      const todayIsFar = data.settings.far_review.active_days.includes(todayDate.getDay());
      const todayIsRest = data.plan.rest_days.includes(todayDate.getDay());
      const todayExpected = activeFortresses.filter((f) => {
        if (f.key === 'far_review') return todayIsFar;
        if ((f.key === 'new_memorization' || f.key === 'near_review') && todayIsRest) return false;
        return true;
      });
      const todayCompleted = todayExpected.filter((f) => todayLog.fortresses[f.key]?.status === 'completed').length;
      const todayProgress = todayExpected.length > 0 ? Math.round((todayCompleted / todayExpected.length) * 100) : 0;

      const isDark = data.settings.dark_mode;

      return (
        <div dir="rtl" className={isDark ? 'dark' : ''}>
          <div className={`min-h-screen ${isDark ? 'bg-slate-900 text-slate-100' : 'bg-stone-50 text-slate-800'}`}>
            <header className={`sticky top-0 z-10 backdrop-blur ${isDark ? 'bg-slate-900/80 border-slate-800' : 'bg-white/80 border-stone-200'} border-b`}>
              <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-white">
                    <BookOpen size={20} />
                  </div>
                  <div>
                    <h1 className="font-bold text-base leading-tight">الحصون الخمسة</h1>
                    <p className={`text-xs ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>لحفظ القرآن الكريم</p>
                  </div>
                </div>
                <button
                  onClick={() => update((d) => { d.settings = { ...d.settings, dark_mode: !d.settings.dark_mode }; return d; })}
                  className={`p-2 rounded-lg ${isDark ? 'bg-slate-800' : 'bg-stone-100'}`}
                >
                  {isDark ? <Sun size={18} /> : <Moon size={18} />}
                </button>
              </div>
            </header>

            <main className="max-w-5xl mx-auto px-4 py-5 pb-32">
              {page === 'dashboard' && <Dashboard data={data} isDark={isDark} todayLog={todayLog} todayProgress={todayProgress} todayCompleted={todayCompleted} todayExpected={todayExpected} stats={stats} setPage={setPage} setSelectedDate={setSelectedDate} todayIsRest={todayIsRest} activeFortresses={activeFortresses} />}
              {page === 'log' && <DailyLog data={data} isDark={isDark} selectedDate={selectedDate} setSelectedDate={setSelectedDate} getLog={getLog} setFortressStatus={setFortressStatus} setFortressMinutes={setFortressMinutes} setFortressNotes={setFortressNotes} setSubtaskStatus={setSubtaskStatus} resetDay={resetDay} activeFortresses={activeFortresses} />}
              {page === 'mushaf' && <Mushaf data={data} isDark={isDark} />}
              {page === 'plan' && <Plan data={data} update={update} isDark={isDark} stats={stats} />}
              {page === 'stats' && <Stats data={data} isDark={isDark} stats={stats} activeFortresses={activeFortresses} />}
              {page === 'settings' && <SettingsPage data={data} update={update} isDark={isDark} activeFortresses={activeFortresses} />}
            </main>

            <nav className={`fixed bottom-0 inset-x-0 ${isDark ? 'bg-slate-900/95 border-slate-800' : 'bg-white/95 border-stone-200'} border-t backdrop-blur`} style={{ paddingBottom: 'max(env(safe-area-inset-bottom), 12px)' }}>
              <div className="max-w-5xl mx-auto px-1 py-2 flex justify-around">
                {[
                  { id: 'dashboard', icon: Home, label: 'الرئيسية' },
                  { id: 'log', icon: Calendar, label: 'السجل' },
                  { id: 'mushaf', icon: Book, label: 'المصحف' },
                  { id: 'plan', icon: BookOpen, label: 'الخطة' },
                  { id: 'stats', icon: BarChart3, label: 'الإحصائيات' },
                  { id: 'settings', icon: SettingsIcon, label: 'الإعدادات' },
                ].map((item) => {
                  const I = item.icon;
                  const active = page === item.id;
                  return (
                    <button key={item.id} onClick={() => { setPage(item.id); if (item.id === 'log') setSelectedDate(todayKey()); }} className={`flex flex-col items-center gap-0.5 px-1.5 py-1.5 rounded-lg transition active:scale-95 min-w-0 ${active ? 'text-emerald-600' : isDark ? 'text-slate-400' : 'text-slate-500'}`}>
                      <I size={19} />
                      <span className="text-[9px] font-medium truncate">{item.label}</span>
                    </button>
                  );
                })}
              </div>
            </nav>
          </div>
        </div>
      );
    }

    // ===== Dashboard =====
    function Dashboard({ data, isDark, todayLog, todayProgress, todayCompleted, todayExpected, stats, setPage, setSelectedDate, todayIsRest, activeFortresses }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const todayMemo = pagesForDate(data.plan, todayKey());

      return (
        <div className="space-y-5">
          <div>
            <p className={`text-sm ${subtle}`}>{arabicDate(todayKey())}</p>
            <h2 className="text-2xl font-bold mt-1">السلام عليكم، بارك الله في يومك</h2>
          </div>
          {todayIsRest && (
            <div className={`rounded-xl border-2 border-dashed ${isDark ? 'border-amber-700 bg-amber-900/20' : 'border-amber-300 bg-amber-50'} p-4 text-center`}>
              <p className="font-semibold text-amber-700 dark:text-amber-400">يوم راحة من الحفظ الجديد</p>
              <p className={`text-xs mt-1 ${subtle}`}>ركّز اليوم على القراءة والاستماع والمراجعة</p>
            </div>
          )}
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <div className="flex items-center justify-between">
              <div>
                <p className={`text-sm ${subtle}`}>إنجاز اليوم</p>
                <p className="text-3xl font-bold mt-1">{todayCompleted} / {todayExpected.length}</p>
                <p className={`text-sm mt-1 ${subtle}`}>حصون مطلوبة اليوم</p>
              </div>
              <div className="relative w-20 h-20">
                <svg className="w-20 h-20 -rotate-90" viewBox="0 0 80 80">
                  <circle cx="40" cy="40" r="34" fill="none" stroke={isDark ? '#334155' : '#e7e5e4'} strokeWidth="8" />
                  <circle cx="40" cy="40" r="34" fill="none" stroke="url(#g)" strokeWidth="8" strokeLinecap="round" strokeDasharray={`${(todayProgress / 100) * 213.6} 213.6`} />
                  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#10b981" /><stop offset="100%" stopColor="#0d9488" /></linearGradient></defs>
                </svg>
                <div className="absolute inset-0 flex items-center justify-center text-sm font-bold">{todayProgress}%</div>
              </div>
            </div>
            {todayMemo && (
              <div className={`mt-4 p-3 rounded-xl ${isDark ? 'bg-slate-900' : 'bg-emerald-50'}`}>
                <p className={`text-xs ${subtle}`}>حفظ اليوم</p>
                <p className="font-bold text-emerald-600 dark:text-emerald-400">
                  {todayMemo.from === todayMemo.to ? `صفحة ${todayMemo.from}` : `صفحات ${todayMemo.from} – ${todayMemo.to}`}
                  <span className={`text-xs font-normal mr-2 ${subtle}`}>({surahForPage(Math.floor(todayMemo.from)).name})</span>
                </p>
              </div>
            )}
            <button onClick={() => { setSelectedDate(todayKey()); setPage('log'); }} className="mt-4 w-full py-2.5 rounded-xl bg-gradient-to-l from-emerald-500 to-teal-600 text-white font-semibold flex items-center justify-center gap-2">
              <Edit3 size={16} /> تحديث إنجاز اليوم
            </button>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <StatCard isDark={isDark} icon={Flame} label="السلسلة" value={stats.streak} suffix="يوم" color="text-orange-500" />
            <StatCard isDark={isDark} icon={TrendingUp} label="أسبوعي" value={stats.weeklyConsistency} suffix="%" color="text-emerald-500" />
            <StatCard isDark={isDark} icon={Award} label="شهري" value={stats.monthlyConsistency} suffix="%" color="text-amber-500" />
          </div>
          <div>
            <h3 className="font-bold mb-3">حصون اليوم</h3>
            <div className="grid sm:grid-cols-2 gap-3">
              {activeFortresses.map((f) => {
                const fl = todayLog.fortresses[f.key];
                const status = fl?.status || 'not_completed';
                const isExpected = todayExpected.includes(f);
                const mins = data.settings.targets[f.key] || 0;
                let amountText = '';
                if (f.key === 'reading_continuous') amountText = amountLabel(data.settings.amounts?.reading_continuous || 'two_juz');
                else if (f.key === 'listening_methodical') amountText = amountLabel(data.settings.amounts?.listening_methodical || 'hezb');
                else if (f.key === 'preparation') amountText = 'أسبوعي + ليلي + قبلي';
                else if (f.key === 'new_memorization') {
                  const tm = pagesForDate(data.plan, todayKey());
                  amountText = tm ? (data.plan.daily_pages === 0.5 ? 'نصف صفحة' : data.plan.daily_pages === 1 ? 'صفحة' : `${data.plan.daily_pages} صفحات`) : 'يوم راحة';
                }
                else if (f.key === 'near_review') amountText = `${data.settings.near_review_pages} صفحة`;
                else if (f.key === 'far_review') amountText = `حتى ${data.settings.far_review.page_cap} صفحة`;
                return (
                  <div key={f.key} className={`rounded-xl border ${cardBg} p-4 ${!isExpected ? 'opacity-40' : ''}`}>
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex-1">
                        <div className="flex items-center gap-2">
                          <div className={`w-8 h-8 rounded-lg bg-gradient-to-br ${colorClasses[f.color]} flex items-center justify-center text-white text-xs font-bold`}>{f.fortress}</div>
                          <h4 className="font-semibold">{f.name}</h4>
                        </div>
                        {isExpected ? (
                          <div className="mt-1.5 flex items-center gap-2 flex-wrap">
                            <span className="text-xs font-semibold text-emerald-600 dark:text-emerald-400">{amountText}</span>
                            {mins > 0 && (
                              <>
                                <span className={`text-xs ${subtle}`}>·</span>
                                <span className={`text-xs ${subtle}`}>{mins} د</span>
                              </>
                            )}
                          </div>
                        ) : (
                          <p className={`text-xs mt-1.5 ${subtle}`}>غير مطلوب اليوم</p>
                        )}
                      </div>
                      {isExpected && <StatusBadge status={status} />}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <div className="flex items-center justify-between mb-3">
              <p className="font-bold">تقدّم الخطة</p>
              <button onClick={() => setPage('plan')} className={`p-2 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'}`}><ChevronLeft size={18} /></button>
            </div>
            <div className="flex items-baseline gap-2">
              <p className="text-2xl font-bold">{Math.floor(stats.memorized)}</p>
              <p className={`text-sm ${subtle}`}>من {stats.totalPlanPages} صفحة ({stats.planProgress}%)</p>
            </div>
            <div className={`mt-2 h-2 rounded-full ${isDark ? 'bg-slate-700' : 'bg-stone-100'} overflow-hidden`}>
              <div className="h-full bg-gradient-to-l from-emerald-500 to-teal-600" style={{ width: `${stats.planProgress}%` }} />
            </div>
          </div>
        </div>
      );
    }

    function StatCard({ isDark, icon: I, label, value, suffix, color }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      return (
        <div className={`rounded-xl border ${cardBg} p-3 text-center`}>
          <I size={18} className={`mx-auto ${color}`} />
          <p className="text-lg font-bold mt-1">{value}<span className="text-xs font-normal mr-0.5">{suffix}</span></p>
          <p className={`text-[11px] ${isDark ? 'text-slate-400' : 'text-slate-500'}`}>{label}</p>
        </div>
      );
    }
    function StatusBadge({ status }) {
      if (status === 'completed') return <div className="w-7 h-7 rounded-full bg-emerald-500 flex items-center justify-center text-white"><Check size={16} /></div>;
      if (status === 'partial') return <div className="w-7 h-7 rounded-full bg-amber-500 flex items-center justify-center text-white"><Minus size={16} /></div>;
      return <div className="w-7 h-7 rounded-full bg-stone-300 dark:bg-slate-600 flex items-center justify-center text-white"><X size={16} /></div>;
    }

    // ===== Daily Log =====
    function DailyLog({ data, isDark, selectedDate, setSelectedDate, getLog, setFortressStatus, setFortressMinutes, setFortressNotes, setSubtaskStatus, resetDay, activeFortresses }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const log = getLog(selectedDate);
      const [view, setView] = useState('day');
      const [expandedNote, setExpandedNote] = useState(null);
      const dt = new Date(selectedDate);
      const isFar = data.settings.far_review.active_days.includes(dt.getDay());
      const isRest = data.plan.rest_days.includes(dt.getDay());
      const changeDate = (delta) => {
        const d = new Date(selectedDate);
        d.setDate(d.getDate() + delta);
        setSelectedDate(dateKeyOf(d));
      };
      const todayMemo = pagesForDate(data.plan, selectedDate);
      const nearRange = nearReviewRange(data.plan, selectedDate, data.settings.near_review_pages);
      const farRange = isFar ? farReviewRange(data.plan, selectedDate, data.settings.near_review_pages, data.settings.far_review.page_cap) : null;
      const fortressDetail = (key) => {
        if (key === 'reading_continuous') return amountLabel(data.settings.amounts?.reading_continuous || 'two_juz');
        if (key === 'listening_methodical') return amountLabel(data.settings.amounts?.listening_methodical || 'hezb');
        if (key === 'new_memorization' && todayMemo) return `صفحات ${todayMemo.from}${todayMemo.from === todayMemo.to ? '' : ' – ' + todayMemo.to} (${surahForPage(Math.floor(todayMemo.from)).name})`;
        if (key === 'near_review' && nearRange) return `صفحات ${nearRange.from} – ${nearRange.to}`;
        if (key === 'far_review' && farRange) return `صفحات ${farRange.from} – ${farRange.to}`;
        return null;
      };

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <h2 className="text-xl font-bold">سجل الإنجاز</h2>
            <div className={`flex rounded-lg overflow-hidden border ${isDark ? 'border-slate-700' : 'border-stone-200'}`}>
              <button onClick={() => setView('day')} className={`px-3 py-1.5 text-xs font-semibold ${view === 'day' ? 'bg-emerald-500 text-white' : ''}`}>يومي</button>
              <button onClick={() => setView('week')} className={`px-3 py-1.5 text-xs font-semibold ${view === 'week' ? 'bg-emerald-500 text-white' : ''}`}>أسبوعي</button>
              <button onClick={() => setView('calendar')} className={`px-3 py-1.5 text-xs font-semibold ${view === 'calendar' ? 'bg-emerald-500 text-white' : ''}`}>التقويم</button>
            </div>
          </div>

          {view === 'calendar' && <CalendarView data={data} isDark={isDark} onSelect={(d) => { setSelectedDate(d); setView('day'); }} activeFortresses={activeFortresses} />}
          {view === 'week' && <WeeklyView data={data} isDark={isDark} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setView={setView} getLog={getLog} activeFortresses={activeFortresses} />}
          {view === 'day' && (
            <>
              <div className={`flex items-center justify-between rounded-xl border ${cardBg} px-3 py-2`}>
                <button onClick={() => changeDate(-1)} className="p-2"><ChevronRight size={18} /></button>
                <div className="text-center">
                  <p className="font-semibold text-sm">{arabicDate(selectedDate)}</p>
                  {selectedDate === todayKey() && <p className={`text-[10px] ${subtle}`}>اليوم</p>}
                </div>
                <button onClick={() => changeDate(1)} disabled={selectedDate >= todayKey()} className="p-2 disabled:opacity-30"><ChevronLeft size={18} /></button>
              </div>

              <button
                onClick={() => {
                  if (confirm(`هل تريد إعادة تعيين إنجاز يوم ${arabicDate(selectedDate)}؟\nسيتم مسح جميع البيانات المسجلة لهذا اليوم.`)) {
                    resetDay(selectedDate);
                  }
                }}
                className="w-full py-2 rounded-xl border-2 border-amber-500 text-amber-600 dark:text-amber-400 font-semibold text-xs flex items-center justify-center gap-2"
              >
                <X size={14} /> إعادة تعيين إنجاز هذا اليوم
              </button>

              {isRest && (
                <div className={`rounded-xl border-2 border-dashed ${isDark ? 'border-amber-700 bg-amber-900/20' : 'border-amber-300 bg-amber-50'} p-3 text-center text-sm`}>
                  <span className="font-semibold text-amber-700 dark:text-amber-400">يوم راحة</span> — لا حفظ جديد ولا مراجعة قريب
                </div>
              )}

              <div className="space-y-3">
                {activeFortresses.map((f) => {
                  const fl = log.fortresses[f.key] || { status: 'not_completed', actual_minutes: 0, notes: '' };
                  const target = data.settings.targets[f.key] || 0;
                  const detail = fortressDetail(f.key);
                  const skipNew = isRest && (f.key === 'new_memorization' || f.key === 'near_review');
                  const skipFar = f.key === 'far_review' && !isFar;
                  const isSkipped = skipNew || skipFar;

                  return (
                    <div key={f.key} className={`rounded-2xl border ${cardBg} p-4 ${isSkipped ? 'opacity-50' : ''}`}>
                      <div className="flex items-start gap-3">
                        <div className={`w-10 h-10 shrink-0 rounded-xl bg-gradient-to-br ${colorClasses[f.color]} flex items-center justify-center text-white font-bold`}>{f.fortress}</div>
                        <div className="flex-1 min-w-0">
                          <h4 className="font-bold">{f.name}</h4>
                          <p className={`text-xs mt-0.5 ${subtle}`}>{f.desc}</p>
                          {detail && !isSkipped && <p className="text-xs mt-1 font-semibold text-emerald-600 dark:text-emerald-400">{detail}</p>}
                          {isSkipped && <p className="text-xs mt-1 text-amber-600 dark:text-amber-400">غير مطلوب اليوم</p>}
                        </div>
                      </div>
                      {!isSkipped && (
                        <>
                          <div className="grid grid-cols-3 gap-2 mt-4">
                            <StatusButton active={fl.status === 'completed'} onClick={() => setFortressStatus(selectedDate, f.key, 'completed')} color="emerald" icon={Check} label="تم" />
                            <StatusButton active={fl.status === 'partial'} onClick={() => setFortressStatus(selectedDate, f.key, 'partial')} color="amber" icon={Minus} label="جزئي" />
                            <StatusButton active={fl.status === 'not_completed'} onClick={() => setFortressStatus(selectedDate, f.key, 'not_completed')} color="stone" icon={X} label="لم يتم" />
                          </div>
                          <div className="mt-3 flex items-center gap-2">
                            <Clock size={14} className={subtle} />
                            <span className={`text-xs ${subtle}`}>الهدف: {target} د</span>
                            <input type="number" min="0" value={fl.actual_minutes || ''} onChange={(e) => setFortressMinutes(selectedDate, f.key, Number(e.target.value))} placeholder="الدقائق" className={`flex-1 mr-auto text-sm px-3 py-1.5 rounded-lg border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-stone-50 border-stone-200'} text-center`} />
                          </div>
                          {f.hasSubtasks && (
                            <div className={`mt-3 pt-3 border-t ${isDark ? 'border-slate-700' : 'border-stone-200'} space-y-2`}>
                              {SUBTASKS.map((s) => {
                                const ss = log.subtasks[s.key] || 'not_completed';
                                return (
                                  <div key={s.key} className="flex items-center justify-between gap-2">
                                    <div className="flex-1 min-w-0">
                                      <p className="text-sm font-medium">{s.name}</p>
                                      <p className={`text-[10px] ${subtle}`}>{s.short}</p>
                                    </div>
                                    <div className="flex gap-1">
                                      <MiniBtn active={ss === 'completed'} onClick={() => setSubtaskStatus(selectedDate, s.key, 'completed')} color="emerald"><Check size={12} /></MiniBtn>
                                      <MiniBtn active={ss === 'partial'} onClick={() => setSubtaskStatus(selectedDate, s.key, 'partial')} color="amber"><Minus size={12} /></MiniBtn>
                                      <MiniBtn active={ss === 'not_completed'} onClick={() => setSubtaskStatus(selectedDate, s.key, 'not_completed')} color="stone"><X size={12} /></MiniBtn>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                          <button onClick={() => setExpandedNote(expandedNote === f.key ? null : f.key)} className={`mt-3 text-xs ${subtle} flex items-center gap-1`}>
                            <Edit3 size={12} /> {fl.notes ? 'تعديل الملاحظات' : 'إضافة ملاحظات'}
                          </button>
                          {expandedNote === f.key && (
                            <textarea value={fl.notes || ''} onChange={(e) => setFortressNotes(selectedDate, f.key, e.target.value)} placeholder="ملاحظات..." rows={2} className={`mt-2 w-full text-sm px-3 py-2 rounded-lg border ${isDark ? 'bg-slate-900 border-slate-700' : 'bg-stone-50 border-stone-200'}`} />
                          )}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
      );
    }

    function StatusButton({ active, onClick, color, icon: I, label }) {
      const colors = {
        emerald: active ? 'bg-emerald-500 text-white border-emerald-500' : 'border-stone-200 dark:border-slate-700 text-emerald-600',
        amber: active ? 'bg-amber-500 text-white border-amber-500' : 'border-stone-200 dark:border-slate-700 text-amber-600',
        stone: active ? 'bg-stone-500 text-white border-stone-500' : 'border-stone-200 dark:border-slate-700 text-stone-500',
      };
      return (
        <button onClick={onClick} className={`flex items-center justify-center gap-1.5 py-2 rounded-xl border-2 text-xs font-semibold transition ${colors[color]}`}>
          <I size={14} /> {label}
        </button>
      );
    }
    function MiniBtn({ active, onClick, color, children }) {
      const colors = {
        emerald: active ? 'bg-emerald-500 text-white' : 'bg-stone-100 dark:bg-slate-700 text-stone-400',
        amber: active ? 'bg-amber-500 text-white' : 'bg-stone-100 dark:bg-slate-700 text-stone-400',
        stone: active ? 'bg-stone-500 text-white' : 'bg-stone-100 dark:bg-slate-700 text-stone-400',
      };
      return <button onClick={onClick} className={`w-7 h-7 rounded-lg flex items-center justify-center ${colors[color]}`}>{children}</button>;
    }

    // ===== Weekly View =====
    function WeeklyView({ data, isDark, selectedDate, setSelectedDate, setView, getLog, activeFortresses }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const borderClr = isDark ? 'border-slate-600' : 'border-stone-300';
      const headBg = isDark ? 'bg-slate-900' : 'bg-purple-50';
      const subHeadBg = isDark ? 'bg-slate-800' : 'bg-purple-100/50';
      const prepOn = activeFortresses.some((f) => f.key === 'preparation');
      const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date(selectedDate)));
      const days = useMemo(() => {
        const arr = [];
        for (let i = 0; i < 7; i++) {
          const d = new Date(weekStart);
          d.setDate(d.getDate() + i);
          arr.push(d);
        }
        return arr;
      }, [weekStart]);
      const weekLabel = `${weekStart.getDate()} ${AR_MONTHS[weekStart.getMonth()]} – ${days[6].getDate()} ${AR_MONTHS[days[6].getMonth()]}`;
      const weekStartPagesBefore = pagesMemorizedBy(data.plan, dateKeyOf(new Date(weekStart.getTime() - 86400000)));
      const weekStartPage = data.plan.start_page + weekStartPagesBefore;
      const weekSurah = surahForPage(Math.floor(weekStartPage));
      const activeDaysThisWeek = days.filter((d) => !data.plan.rest_days.includes(d.getDay())).length;
      const weekPagesTarget = activeDaysThisWeek * data.plan.daily_pages;
      const cellSymbol = (status, fallback = '—') => {
        if (status === 'completed') return <span className="text-emerald-600 dark:text-emerald-400 text-base font-bold">☑</span>;
        if (status === 'partial') return <span className="text-amber-500 text-base font-bold">◐</span>;
        if (status === 'not_completed') return <span className="text-red-500 text-base font-bold">☒</span>;
        return <span className={subtle}>{fallback}</span>;
      };
      let weekTotal = 0, weekDone = 0, weekMinutes = 0, weekPagesDone = 0;
      days.forEach((d) => {
        const k = dateKeyOf(d);
        const log = getLog(k);
        const isFar = data.settings.far_review.active_days.includes(d.getDay());
        const isRest = data.plan.rest_days.includes(d.getDay());
        const expected = activeFortresses.filter((f) => {
          if (f.key === 'far_review') return isFar;
          if ((f.key === 'new_memorization' || f.key === 'near_review') && isRest) return false;
          return true;
        });
        weekTotal += expected.length;
        expected.forEach((f) => {
          const fl = log.fortresses[f.key];
          if (fl?.status === 'completed') weekDone++;
          weekMinutes += Number(fl?.actual_minutes) || 0;
        });
        if (!isRest && log.fortresses.new_memorization?.status === 'completed') weekPagesDone += data.plan.daily_pages;
      });
      const consistency = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;
      const readingLabel = amountLabel(data.settings.amounts?.reading_continuous || 'two_juz');
      const listeningLabel = amountLabel(data.settings.amounts?.listening_methodical || 'hezb');

      return (
        <div className="space-y-4">
          <div className={`flex items-center justify-between rounded-xl border ${cardBg} px-3 py-2`}>
            <button onClick={() => { const d = new Date(weekStart); d.setDate(d.getDate() + 7); setWeekStart(d); }} className="p-2"><ChevronRight size={18} /></button>
            <p className="font-semibold text-sm">{weekLabel}</p>
            <button onClick={() => { const d = new Date(weekStart); d.setDate(d.getDate() - 7); setWeekStart(d); }} className="p-2"><ChevronLeft size={18} /></button>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className={`rounded-xl border ${cardBg} p-3 text-center`}>
              <p className="text-lg font-bold">{consistency}%</p>
              <p className={`text-[10px] ${subtle}`}>الالتزام</p>
            </div>
            <div className={`rounded-xl border ${cardBg} p-3 text-center`}>
              <p className="text-lg font-bold">{weekPagesDone} / {weekPagesTarget}</p>
              <p className={`text-[10px] ${subtle}`}>صفحة محفوظة</p>
            </div>
            <div className={`rounded-xl border ${cardBg} p-3 text-center`}>
              <p className="text-lg font-bold">{weekMinutes}</p>
              <p className={`text-[10px] ${subtle}`}>دقيقة</p>
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-2`}>
            <div className="text-center mb-3">
              <p className="font-bold text-sm">جدول متابعة حفظ القرآن بطريقة الحصون الخمسة</p>
              <p className={`text-xs ${subtle}`}>سورة {weekSurah.name} — {weekPagesTarget} صفحات هذا الأسبوع</p>
              <p className={`text-[10px] mt-1 sm:hidden ${subtle}`}>← اسحب الجدول أفقياً لرؤية كامل الأعمدة</p>
            </div>
            <div className="overflow-x-auto -mx-2 px-2">
              <table className="w-full text-[11px] border-collapse" style={{ minWidth: prepOn ? 760 : 560 }}>
                <thead>
                  <tr className={headBg}>
                    <th className={`p-1.5 border ${borderClr} text-center`} rowSpan={2} style={{ width: 70 }}>اليوم / التاريخ</th>
                    <th className={`p-1.5 border ${borderClr} text-center`} colSpan={2}>الحصن الأول</th>
                    {prepOn && <th className={`p-1.5 border ${borderClr} text-center`} colSpan={3}>الحصن الثاني</th>}
                    <th className={`p-1.5 border ${borderClr} text-center`} rowSpan={2}>الحصن الثالث</th>
                    <th className={`p-1.5 border ${borderClr} text-center`} rowSpan={2}>الحصن الرابع</th>
                    <th className={`p-1.5 border ${borderClr} text-center`} rowSpan={2}>الحصن الخامس</th>
                  </tr>
                  <tr className={subHeadBg}>
                    <th className={`p-1.5 border ${borderClr} text-center font-normal`}>القراءة المستمرة<br /><span className={`text-[9px] ${subtle}`}>({readingLabel} يومياً)</span></th>
                    <th className={`p-1.5 border ${borderClr} text-center font-normal`}>الاستماع المنهجي<br /><span className={`text-[9px] ${subtle}`}>({listeningLabel} يومياً)</span></th>
                    {prepOn && <>
                      <th className={`p-1.5 border ${borderClr} text-center font-normal`}>التحضير<br /><span className={`text-[9px] ${subtle}`}>إسبوعي ({weekPagesTarget} صفحات)</span></th>
                      <th className={`p-1.5 border ${borderClr} text-center font-normal`}>التحضير<br /><span className={`text-[9px] ${subtle}`}>ليلي (15د+15د)</span></th>
                      <th className={`p-1.5 border ${borderClr} text-center font-normal`}>التحضير<br /><span className={`text-[9px] ${subtle}`}>قبلي (15د قبل الحفظ)</span></th>
                    </>}
                  </tr>
                  <tr className={subHeadBg}>
                    <th className={`p-1.5 border ${borderClr}`}></th>
                    <th className={`p-1.5 border ${borderClr}`}></th>
                    <th className={`p-1.5 border ${borderClr}`}></th>
                    {prepOn && <>
                      <th className={`p-1.5 border ${borderClr}`}></th>
                      <th className={`p-1.5 border ${borderClr}`}></th>
                      <th className={`p-1.5 border ${borderClr}`}></th>
                    </>}
                    <th className={`p-1.5 border ${borderClr} text-center font-normal text-[10px]`}>الحفظ الجديد</th>
                    <th className={`p-1.5 border ${borderClr} text-center font-normal text-[10px]`}>مراجعة القريب<br /><span className={`text-[9px] ${subtle}`}>({data.settings.near_review_pages} صفحة)</span></th>
                    <th className={`p-1.5 border ${borderClr} text-center font-normal text-[10px]`}>مراجعة البعيد<br /><span className={`text-[9px] ${subtle}`}>(حد {data.settings.far_review.page_cap} ص)</span></th>
                  </tr>
                </thead>
                <tbody>
                  {days.map((d) => {
                    const k = dateKeyOf(d);
                    const log = getLog(k);
                    const isFar = data.settings.far_review.active_days.includes(d.getDay());
                    const isRest = data.plan.rest_days.includes(d.getDay());
                    const isToday = k === todayKey();
                    const dayMemo = pagesForDate(data.plan, k);
                    const nearR = nearReviewRange(data.plan, k, data.settings.near_review_pages);
                    const farR = isFar ? farReviewRange(data.plan, k, data.settings.near_review_pages, data.settings.far_review.page_cap) : null;
                    return (
                      <tr key={k} className={`${isToday ? (isDark ? 'bg-emerald-900/20' : 'bg-emerald-50') : ''} cursor-pointer hover:opacity-80`} onClick={() => { setSelectedDate(k); setView('day'); }}>
                        <td className={`p-1.5 border ${borderClr} text-center font-bold`}>
                          {AR_DAYS[d.getDay()]}
                          <div className={`text-[9px] font-normal ${subtle}`}>{d.getDate()}/{d.getMonth()+1}</div>
                        </td>
                        <td className={`p-1.5 border ${borderClr} text-center`}>
                          <div className="text-[9px] mb-0.5 text-stone-400">{readingLabel}</div>
                          {cellSymbol(log.fortresses.reading_continuous?.status)}
                        </td>
                        <td className={`p-1.5 border ${borderClr} text-center`}>
                          <div className="text-[9px] mb-0.5 text-stone-400">{listeningLabel}</div>
                          {cellSymbol(log.fortresses.listening_methodical?.status)}
                        </td>
                        {prepOn && <>
                          <td className={`p-1.5 border ${borderClr} text-center`}>
                            <div className="text-[9px] mb-0.5 text-stone-400">{weekPagesTarget} ص</div>
                            {cellSymbol(log.subtasks.preparation_weekly)}
                          </td>
                          <td className={`p-1.5 border ${borderClr} text-center`}>{cellSymbol(log.subtasks.preparation_nightly)}</td>
                          <td className={`p-1.5 border ${borderClr} text-center`}>{cellSymbol(log.subtasks.preparation_pre_session)}</td>
                        </>}
                        <td className={`p-1.5 border ${borderClr} text-center`}>
                          {isRest ? <span className={`text-[9px] ${subtle}`}>راحة</span> : (
                            <>
                              {dayMemo && <div className="text-[9px] mb-0.5 text-stone-400">ص {dayMemo.from}{dayMemo.from !== dayMemo.to ? `-${dayMemo.to}` : ''}</div>}
                              {cellSymbol(log.fortresses.new_memorization?.status)}
                            </>
                          )}
                        </td>
                        <td className={`p-1.5 border ${borderClr} text-center`}>
                          {isRest ? <span className={subtle}>—</span> : (
                            <>
                              {nearR && <div className="text-[9px] mb-0.5 text-stone-400">ص {nearR.from}-{nearR.to}</div>}
                              {cellSymbol(log.fortresses.near_review?.status)}
                            </>
                          )}
                        </td>
                        <td className={`p-1.5 border ${borderClr} text-center`}>
                          {!isFar ? <span className={subtle}>—</span> : (
                            <>
                              {farR && <div className="text-[9px] mb-0.5 text-stone-400">ص {farR.from}-{farR.to}</div>}
                              {cellSymbol(log.fortresses.far_review?.status)}
                            </>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <p className={`text-[10px] mt-3 text-center ${subtle}`}>
              لتعبئة الجدول: اضغط على أي يوم للتعديل · ☑ تم · ◐ جزئي · ☒ لم يتم
            </p>
          </div>
        </div>
      );
    }

    // ===== Calendar View =====
    function CalendarView({ data, isDark, onSelect, activeFortresses }) {
      const [month, setMonth] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const daysInMonth = new Date(month.y, month.m + 1, 0).getDate();
      const firstDay = new Date(month.y, month.m, 1).getDay();
      const monthName = AR_MONTHS[month.m];
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      const dayState = (d) => {
        const k = `${month.y}-${String(month.m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const log = data.logs[k];
        if (!log) return 'none';
        const dt = new Date(k);
        const isFar = data.settings.far_review.active_days.includes(dt.getDay());
        const isRest = data.plan.rest_days.includes(dt.getDay());
        const expected = activeFortresses.filter((f) => {
          if (f.key === 'far_review') return isFar;
          if ((f.key === 'new_memorization' || f.key === 'near_review') && isRest) return false;
          return true;
        });
        const completed = expected.filter((f) => log.fortresses[f.key]?.status === 'completed').length;
        if (expected.length > 0 && completed === expected.length) return 'full';
        if (completed > 0) return 'partial';
        return 'none';
      };
      return (
        <div className={`rounded-2xl border ${cardBg} p-4`}>
          <div className="flex items-center justify-between mb-4">
            <button onClick={() => setMonth((m) => m.m === 11 ? { y: m.y + 1, m: 0 } : { y: m.y, m: m.m + 1 })} className="p-1.5"><ChevronRight size={18} /></button>
            <p className="font-bold">{monthName} {month.y}</p>
            <button onClick={() => setMonth((m) => m.m === 0 ? { y: m.y - 1, m: 11 } : { y: m.y, m: m.m - 1 })} className="p-1.5"><ChevronLeft size={18} /></button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center text-[10px] font-semibold text-stone-400 mb-2">
            {['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'].map((d) => <div key={d}>{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {cells.map((d, i) => {
              if (!d) return <div key={i} />;
              const state = dayState(d);
              const k = `${month.y}-${String(month.m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
              const bg = state === 'full' ? 'bg-emerald-500 text-white' : state === 'partial' ? 'bg-amber-400 text-white' : isDark ? 'bg-slate-700' : 'bg-stone-100';
              return <button key={i} onClick={() => onSelect(k)} className={`aspect-square rounded-lg text-xs font-semibold ${bg}`}>{d}</button>;
            })}
          </div>
          <div className="mt-4 flex items-center justify-center gap-4 text-[10px]">
            <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-emerald-500" /> مكتمل</div>
            <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-amber-400" /> جزئي</div>
            <div className="flex items-center gap-1"><div className={`w-3 h-3 rounded ${isDark ? 'bg-slate-700' : 'bg-stone-200'}`} /> لا نشاط</div>
          </div>
        </div>
      );
    }

    // ===== Mushaf =====
    function Mushaf({ data, isDark }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const inputBg = isDark ? 'bg-slate-900 border-slate-700' : 'bg-stone-50 border-stone-200';
      const [pageNum, setPageNum] = useState(() => {
        const todayMemo = pagesForDate(data.plan, todayKey());
        return todayMemo ? Math.floor(todayMemo.from) : 1;
      });
      const [verses, setVerses] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [fontSize, setFontSize] = useState(26);
      const [controlsOpen, setControlsOpen] = useState(false);

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setError(null);
        fetch(`https://api.alquran.cloud/v1/page/${pageNum}/quran-uthmani`)
          .then((r) => { if (!r.ok) throw new Error('فشل تحميل الصفحة (' + r.status + ')'); return r.json(); })
          .then((json) => {
            if (cancelled) return;
            if (json.code !== 200 || !json.data?.ayahs) throw new Error('استجابة غير متوقعة من الخادم');
            const normalized = json.data.ayahs.map((a) => ({
              id: a.number, chapter_id: a.surah.number, verse_number: a.numberInSurah, text_uthmani: a.text,
            }));
            setVerses(normalized);
            setLoading(false);
          })
          .catch((err) => { if (cancelled) return; setError(err.message || 'فشل الاتصال'); setLoading(false); });
        return () => { cancelled = true; };
      }, [pageNum]);

      const currentSurah = surahForPage(pageNum);
      const todayMemo = pagesForDate(data.plan, todayKey());
      const jumpToToday = () => { if (todayMemo) setPageNum(Math.floor(todayMemo.from)); };
      const versesBySurah = useMemo(() => {
        const groups = {};
        verses.forEach((v) => {
          const sid = v.chapter_id;
          if (!groups[sid]) groups[sid] = [];
          groups[sid].push(v);
        });
        return groups;
      }, [verses]);
      const toArabicNum = (n) => String(n).replace(/[0-9]/g, (d) => '٠١٢٣٤٥٦٧٨٩'[d]);

      return (
        <div className="space-y-2">
          <div className={`rounded-xl border ${cardBg} p-2 flex items-center gap-2`}>
            <button onClick={() => setPageNum((p) => Math.min(604, p + 1))} disabled={pageNum >= 604} className={`p-1.5 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'} disabled:opacity-30 shrink-0`}>
              <ChevronRight size={16} />
            </button>
            <div className="flex-1 min-w-0 text-center">
              <p className="font-bold text-sm truncate">{currentSurah.name}</p>
              <div className="flex items-center justify-center gap-1 text-[10px]">
                <span className={subtle}>صفحة</span>
                <input type="number" min="1" max="604" value={pageNum} onChange={(e) => { const v = Number(e.target.value); if (v >= 1 && v <= 604) setPageNum(v); }} className={`w-12 px-1 py-0.5 rounded border text-center font-bold ${inputBg}`} />
                <span className={subtle}>/ 604</span>
              </div>
            </div>
            <button onClick={() => setPageNum((p) => Math.max(1, p - 1))} disabled={pageNum <= 1} className={`p-1.5 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'} disabled:opacity-30 shrink-0`}>
              <ChevronLeft size={16} />
            </button>
            <button onClick={() => setControlsOpen((v) => !v)} className={`p-1.5 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'} shrink-0 text-xs font-bold`}>
              Aa
            </button>
          </div>
          {controlsOpen && (
            <div className={`rounded-xl border ${cardBg} p-2 flex items-center justify-between gap-2`}>
              <div className="flex items-center gap-1">
                <span className={`text-[10px] ${subtle}`}>حجم الخط</span>
                <button onClick={() => setFontSize((s) => Math.max(16, s - 2))} className={`w-7 h-7 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'} text-sm font-bold`}>−</button>
                <span className="text-xs w-6 text-center">{fontSize}</span>
                <button onClick={() => setFontSize((s) => Math.min(44, s + 2))} className={`w-7 h-7 rounded-lg ${isDark ? 'bg-slate-700' : 'bg-stone-100'} text-sm font-bold`}>+</button>
              </div>
              {todayMemo && (
                <button onClick={jumpToToday} className="px-3 py-1.5 rounded-lg bg-emerald-500 text-white font-semibold text-[11px] flex items-center gap-1">
                  <BookOpen size={12} />
                  حفظ اليوم ({todayMemo.from}{todayMemo.from !== todayMemo.to ? `-${todayMemo.to}` : ''})
                </button>
              )}
            </div>
          )}
          <div className={`rounded-2xl border ${cardBg} p-4 sm:p-6`} style={{ minHeight: 'calc(100vh - 200px)' }}>
            {loading && (
              <div className="flex flex-col items-center justify-center py-16 gap-2">
                <div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin" />
                <p className={`text-xs ${subtle}`}>جاري تحميل الصفحة...</p>
              </div>
            )}
            {error && (
              <div className="text-center py-12">
                <p className="text-red-500 text-sm">{error}</p>
                <p className={`text-xs mt-2 ${subtle}`}>تأكد من اتصالك بالإنترنت</p>
                <button onClick={() => setPageNum((p) => p)} className="mt-3 px-4 py-2 rounded-lg bg-emerald-500 text-white text-sm font-semibold">إعادة المحاولة</button>
              </div>
            )}
            {!loading && !error && verses.length > 0 && (
              <div className="space-y-5">
                {Object.entries(versesBySurah).map(([sid, sVerses]) => {
                  const surah = SURAHS.find((s) => s.n === Number(sid));
                  const startsWithFirstVerse = sVerses[0]?.verse_number === 1;
                  return (
                    <div key={sid}>
                      {startsWithFirstVerse && surah && (
                        <div className={`text-center mb-4 pb-3 border-b-2 ${isDark ? 'border-emerald-900' : 'border-emerald-200'}`}>
                          <p className="font-bold text-lg text-emerald-600 dark:text-emerald-400">سورة {surah.name}</p>
                          {surah.n !== 1 && surah.n !== 9 && (
                            <p className="mt-2 quran-text" style={{ fontSize: `${fontSize + 2}px` }}>بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</p>
                          )}
                        </div>
                      )}
                      <p className="text-justify quran-text" style={{ fontSize: `${fontSize}px`, lineHeight: 2.3 }}>
                        {sVerses.map((v) => (
                          <span key={v.id}>
                            {v.text_uthmani}
                            <span className="inline-block mx-1 text-emerald-600 dark:text-emerald-400" style={{ fontSize: `${fontSize * 0.65}px` }}>
                              ﴿{toArabicNum(v.verse_number)}﴾
                            </span>
                            {' '}
                          </span>
                        ))}
                      </p>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===== Plan =====
    function Plan({ data, update, isDark, stats }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const inputBg = isDark ? 'bg-slate-900 border-slate-700' : 'bg-stone-50 border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const setPlan = (k, v) => update((d) => { d.plan = { ...d.plan, [k]: v }; return d; });
      const toggleRest = (idx) => update((d) => {
        const cur = d.plan.rest_days || [];
        d.plan = { ...d.plan, rest_days: cur.includes(idx) ? cur.filter((i) => i !== idx) : [...cur, idx] };
        return d;
      });
      const startSurah = surahForPage(data.plan.start_page);
      const endSurah = surahForPage(data.plan.end_page);
      const finishStr = arabicDate(dateKeyOf(stats.finishDate));

      return (
        <div className="space-y-5">
          <h2 className="text-xl font-bold">خطة الحفظ</h2>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-3">ملخص التقدم</h3>
            <div className="grid grid-cols-2 gap-3 text-center">
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900' : 'bg-stone-50'}`}>
                <p className={`text-xs ${subtle}`}>المحفوظ</p>
                <p className="text-xl font-bold">{Math.floor(stats.memorized)} / {stats.totalPlanPages}</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900' : 'bg-stone-50'}`}>
                <p className={`text-xs ${subtle}`}>نسبة الإنجاز</p>
                <p className="text-xl font-bold text-emerald-600">{stats.planProgress}%</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900' : 'bg-stone-50'}`}>
                <p className={`text-xs ${subtle}`}>أيام الحفظ أسبوعياً</p>
                <p className="text-xl font-bold">{stats.activeDaysPerWeek}</p>
              </div>
              <div className={`p-3 rounded-xl ${isDark ? 'bg-slate-900' : 'bg-stone-50'}`}>
                <p className={`text-xs ${subtle}`}>الانتهاء المتوقع</p>
                <p className="text-sm font-bold">{finishStr}</p>
              </div>
            </div>
            <div className={`mt-4 h-2 rounded-full ${isDark ? 'bg-slate-700' : 'bg-stone-100'} overflow-hidden`}>
              <div className="h-full bg-gradient-to-l from-emerald-500 to-teal-600" style={{ width: `${stats.planProgress}%` }} />
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5 space-y-4`}>
            <div>
              <label className="text-sm font-semibold mb-2 block">المقدار اليومي</label>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setPlan('daily_pages', 0.5)} className={`py-3 rounded-xl border-2 font-semibold ${data.plan.daily_pages === 0.5 ? 'bg-emerald-500 text-white border-emerald-500' : inputBg}`}>نصف صفحة</button>
                <button onClick={() => setPlan('daily_pages', 1)} className={`py-3 rounded-xl border-2 font-semibold ${data.plan.daily_pages === 1 ? 'bg-emerald-500 text-white border-emerald-500' : inputBg}`}>صفحة كاملة</button>
              </div>
            </div>
            <div>
              <label className="text-sm font-semibold mb-2 block">من صفحة (1 - 604)</label>
              <input type="number" min="1" max="604" value={data.plan.start_page} onChange={(e) => setPlan('start_page', Math.max(1, Math.min(604, Number(e.target.value))))} className={`w-full px-3 py-2.5 rounded-xl border ${inputBg} text-center text-lg font-bold`} />
              <p className={`text-xs mt-1 ${subtle}`}>السورة: {startSurah.name}</p>
            </div>
            <div>
              <label className="text-sm font-semibold mb-2 block">إلى صفحة (1 - 604)</label>
              <input type="number" min="1" max="604" value={data.plan.end_page} onChange={(e) => setPlan('end_page', Math.max(1, Math.min(604, Number(e.target.value))))} className={`w-full px-3 py-2.5 rounded-xl border ${inputBg} text-center text-lg font-bold`} />
              <p className={`text-xs mt-1 ${subtle}`}>السورة: {endSurah.name}</p>
            </div>
            <div>
              <label className="text-sm font-semibold mb-2 block">تاريخ البداية</label>
              <input type="date" value={data.plan.start_date} onChange={(e) => setPlan('start_date', e.target.value)} className={`w-full px-3 py-2.5 rounded-xl border ${inputBg}`} />
            </div>
            <div>
              <label className="text-sm font-semibold mb-2 block">أيام الراحة من الحفظ الجديد</label>
              <p className={`text-xs mb-2 ${subtle}`}>اختر الأيام التي لا تريد فيها حفظاً جديداً (تبقى باقي الحصون كما هي)</p>
              <div className="grid grid-cols-7 gap-1">
                {WEEK_DAYS.map((day) => {
                  const active = data.plan.rest_days.includes(day.idx);
                  return (
                    <button key={day.idx} onClick={() => toggleRest(day.idx)} className={`py-2 rounded-lg text-[10px] font-semibold border-2 ${active ? 'bg-amber-500 text-white border-amber-500' : inputBg}`}>
                      {day.short}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===== Stats =====
    function Stats({ data, isDark, stats, activeFortresses }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      return (
        <div className="space-y-5">
          <h2 className="text-xl font-bold">الإحصائيات</h2>
          <div className="grid grid-cols-2 gap-3">
            <div className={`rounded-2xl border ${cardBg} p-4`}>
              <p className={`text-xs ${subtle}`}>أيام الالتزام الكامل</p>
              <p className="text-3xl font-bold mt-1">{stats.fullDays}</p>
              <p className={`text-xs ${subtle}`}>من أصل {stats.daysInMonth} يوم</p>
            </div>
            <div className={`rounded-2xl border ${cardBg} p-4`}>
              <p className={`text-xs ${subtle}`}>الالتزام الشهري</p>
              <p className="text-3xl font-bold mt-1">{stats.monthlyConsistency}<span className="text-base">%</span></p>
              <p className={`text-xs ${subtle}`}>هذا الشهر</p>
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-4">الأداء حسب الحصن</h3>
            <div className="space-y-3">
              {activeFortresses.map((f) => {
                const s = stats.perFortress[f.key];
                const pct = Math.round((s.completed / stats.daysInMonth) * 100);
                return (
                  <div key={f.key}>
                    <div className="flex items-center justify-between text-sm mb-1">
                      <span className="font-semibold">{f.name}</span>
                      <span className={subtle}>{s.completed} يوم — {s.minutes} د</span>
                    </div>
                    <div className={`h-2 rounded-full ${isDark ? 'bg-slate-700' : 'bg-stone-100'} overflow-hidden`}>
                      <div className={`h-full bg-gradient-to-l ${colorClasses[f.color]}`} style={{ width: `${pct}%` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="space-y-3">
            <div className={`rounded-2xl border ${cardBg} p-4 flex items-start gap-3`}>
              <Award size={20} className="text-emerald-500 shrink-0 mt-0.5" />
              <div>
                <p className="text-sm font-semibold">أقوى حصن</p>
                <p className={`text-xs ${subtle}`}>{stats.strongest.name} — {stats.perFortress[stats.strongest.key].completed} يوم مكتمل</p>
              </div>
            </div>
            <div className={`rounded-2xl border ${cardBg} p-4 flex items-start gap-3`}>
              <TrendingUp size={20} className="text-amber-500 shrink-0 mt-0.5" />
              <div>
                <p className="text-sm font-semibold">يحتاج تركيز أكثر</p>
                <p className={`text-xs ${subtle}`}>{stats.weakest.name} — {stats.perFortress[stats.weakest.key].completed} يوم مكتمل فقط</p>
              </div>
            </div>
            <div className={`rounded-2xl border ${cardBg} p-4 flex items-start gap-3`}>
              <Flame size={20} className="text-orange-500 shrink-0 mt-0.5" />
              <div>
                <p className="text-sm font-semibold">سلسلة الالتزام الكامل</p>
                <p className={`text-xs ${subtle}`}>{stats.streak} يوم متتالي بإذن الله</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===== Settings =====
    function SettingsPage({ data, update, isDark, activeFortresses }) {
      const cardBg = isDark ? 'bg-slate-800 border-slate-700' : 'bg-white border-stone-200';
      const inputBg = isDark ? 'bg-slate-900 border-slate-700' : 'bg-stone-50 border-stone-200';
      const subtle = isDark ? 'text-slate-400' : 'text-slate-500';
      const setTarget = (k, v) => update((d) => { d.settings = { ...d.settings, targets: { ...d.settings.targets, [k]: Number(v) } }; return d; });
      const toggleFarDay = (idx) => update((d) => {
        const cur = d.settings.far_review.active_days || [];
        d.settings = { ...d.settings, far_review: { ...d.settings.far_review, active_days: cur.includes(idx) ? cur.filter((i) => i !== idx) : [...cur, idx] } };
        return d;
      });

      return (
        <div className="space-y-5">
          <h2 className="text-xl font-bold">الإعدادات</h2>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <div className="flex items-center justify-between">
              <div>
                <p className="font-semibold">الوضع الليلي</p>
                <p className={`text-xs mt-0.5 ${subtle}`}>تفعيل المظهر الداكن</p>
              </div>
              <button onClick={() => update((d) => { d.settings = { ...d.settings, dark_mode: !d.settings.dark_mode }; return d; })} className={`relative w-12 h-7 rounded-full transition ${data.settings.dark_mode ? 'bg-emerald-500' : 'bg-stone-300'}`}>
                <div className={`absolute top-1 w-5 h-5 rounded-full bg-white transition ${data.settings.dark_mode ? 'right-1' : 'right-6'}`} />
              </button>
            </div>
          </div>

          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <div className="flex items-center justify-between gap-3">
              <div className="flex-1">
                <p className="font-semibold">تفعيل حصن التحضير</p>
                <p className={`text-xs mt-0.5 ${subtle}`}>
                  {data.settings.preparation_enabled !== false
                    ? 'حصن التحضير مفعّل ويظهر في جميع الشاشات'
                    : 'حصن التحضير مخفي من جميع الشاشات (البيانات القديمة محفوظة)'}
                </p>
              </div>
              <button onClick={() => update((d) => { d.settings = { ...d.settings, preparation_enabled: d.settings.preparation_enabled === false }; return d; })} className={`relative w-12 h-7 rounded-full transition shrink-0 ${data.settings.preparation_enabled !== false ? 'bg-emerald-500' : 'bg-stone-300'}`}>
                <div className={`absolute top-1 w-5 h-5 rounded-full bg-white transition ${data.settings.preparation_enabled !== false ? 'right-1' : 'right-6'}`} />
              </button>
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-4">إعدادات مراجعة البعيد</h3>
            <div className="space-y-4">
              <div>
                <label className="text-sm font-semibold mb-2 block">أيام تفعيل مراجعة البعيد</label>
                <div className="grid grid-cols-7 gap-1">
                  {WEEK_DAYS.map((day) => {
                    const active = data.settings.far_review.active_days.includes(day.idx);
                    return (
                      <button key={day.idx} onClick={() => toggleFarDay(day.idx)} className={`py-2 rounded-lg text-[10px] font-semibold border-2 ${active ? 'bg-indigo-500 text-white border-indigo-500' : inputBg}`}>
                        {day.short}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div>
                <label className="text-sm font-semibold mb-2 block">الحد الأقصى للصفحات يومياً</label>
                <input type="number" min="1" max="604" value={data.settings.far_review.page_cap} onChange={(e) => update((d) => { d.settings = { ...d.settings, far_review: { ...d.settings.far_review, page_cap: Number(e.target.value) } }; return d; })} className={`w-full px-3 py-2 rounded-xl border ${inputBg} text-center`} />
              </div>
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-4">إعدادات مراجعة القريب</h3>
            <div>
              <label className="text-sm font-semibold mb-2 block">عدد الصفحات قبل الحفظ الجديد</label>
              <input type="number" min="1" max="100" value={data.settings.near_review_pages} onChange={(e) => update((d) => { d.settings = { ...d.settings, near_review_pages: Number(e.target.value) }; return d; })} className={`w-full px-3 py-2 rounded-xl border ${inputBg} text-center`} />
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-4">المقدار اليومي للقراءة والاستماع</h3>
            <div className="space-y-4">
              <div>
                <label className="text-sm font-semibold mb-2 block">القراءة المستمرة</label>
                <select
                  value={data.settings.amounts?.reading_continuous || 'two_juz'}
                  onChange={(e) => update((d) => { d.settings = { ...d.settings, amounts: { ...(d.settings.amounts || {}), reading_continuous: e.target.value } }; return d; })}
                  className={`w-full px-3 py-2.5 rounded-xl border ${inputBg}`}
                >
                  {AMOUNT_OPTIONS.map((a) => <option key={a.key} value={a.key}>{a.label}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-semibold mb-2 block">الاستماع المنهجي</label>
                <select
                  value={data.settings.amounts?.listening_methodical || 'hezb'}
                  onChange={(e) => update((d) => { d.settings = { ...d.settings, amounts: { ...(d.settings.amounts || {}), listening_methodical: e.target.value } }; return d; })}
                  className={`w-full px-3 py-2.5 rounded-xl border ${inputBg}`}
                >
                  {AMOUNT_OPTIONS.map((a) => <option key={a.key} value={a.key}>{a.label}</option>)}
                </select>
              </div>
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-4">المدة المستهدفة لكل حصن (دقيقة)</h3>
            <div className="space-y-3">
              {activeFortresses.map((f) => (
                <div key={f.key} className="flex items-center justify-between gap-3">
                  <span className="text-sm">{f.name}</span>
                  <input type="number" min="0" value={data.settings.targets[f.key] || 0} onChange={(e) => setTarget(f.key, e.target.value)} className={`w-20 px-2 py-1.5 rounded-lg border text-center ${inputBg}`} />
                </div>
              ))}
            </div>
          </div>
          <div className={`rounded-2xl border ${cardBg} p-5`}>
            <h3 className="font-bold mb-2">النسخ الاحتياطي</h3>
            <p className={`text-xs mb-4 ${subtle}`}>احفظ بياناتك بشكل دوري في ملف</p>
            <div className="grid grid-cols-2 gap-2">
              <button
                onClick={() => {
                  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url; a.download = `husun-backup-${todayKey()}.json`;
                  document.body.appendChild(a); a.click(); document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                }}
                className="py-3 rounded-xl bg-emerald-500 text-white font-semibold text-sm flex items-center justify-center gap-2"
              >
                <Download size={16} /> تصدير
              </button>
              <label className="py-3 rounded-xl bg-sky-500 text-white font-semibold text-sm flex items-center justify-center gap-2 cursor-pointer">
                <Upload size={16} /> استيراد
                <input type="file" accept="application/json,.json" className="hidden" onChange={(e) => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  const reader = new FileReader();
                  reader.onload = (ev) => {
                    try {
                      const imported = JSON.parse(ev.target.result);
                      if (!imported.plan || !imported.settings || !imported.logs) { alert('ملف غير صالح'); return; }
                      if (confirm('سيتم استبدال جميع البيانات الحالية. هل تريد المتابعة؟')) {
                        update(() => imported);
                        alert('تم استيراد البيانات بنجاح');
                      }
                    } catch (err) { alert('فشل قراءة الملف: ' + err.message); }
                  };
                  reader.readAsText(file); e.target.value = '';
                }} />
              </label>
            </div>
          </div>
          <div className={`rounded-2xl border-2 border-red-500/50 ${cardBg} p-5`}>
            <h3 className="font-bold mb-2 text-red-600 dark:text-red-400">منطقة الخطر</h3>
            <p className={`text-xs mb-4 ${subtle}`}>الإجراءات التالية لا يمكن التراجع عنها. ننصح بتصدير نسخة احتياطية أولاً.</p>
            <div className="space-y-2">
              <button
                onClick={() => {
                  if (confirm('هل تريد مسح سجل الإنجاز فقط؟\n(سيتم الاحتفاظ بالخطة والإعدادات)')) {
                    if (confirm('تأكيد نهائي: سيتم حذف جميع بيانات الإنجاز اليومي. هل أنت متأكد؟')) {
                      update((d) => { d.logs = {}; return d; });
                      alert('تم مسح سجل الإنجاز');
                    }
                  }
                }}
                className="w-full py-2.5 rounded-xl border-2 border-amber-500 text-amber-600 dark:text-amber-400 font-semibold text-sm"
              >
                مسح سجل الإنجاز فقط
              </button>
              <button
                onClick={() => {
                  if (confirm('هل تريد مسح جميع البيانات؟')) {
                    if (confirm('تأكيد نهائي: لا يمكن التراجع عن هذا الإجراء. هل أنت متأكد تماماً؟')) {
                      localStorage.removeItem(STORAGE_KEY);
                      location.reload();
                    }
                  }
                }}
                className="w-full py-2.5 rounded-xl border-2 border-red-500 text-red-500 font-semibold text-sm"
              >
                مسح جميع البيانات (إعادة ضبط المصنع)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ===== Mount =====
    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(<App />);
    // Hide loading screen as soon as React has rendered
    requestAnimationFrame(() => {
      const ls = document.getElementById('loading-screen');
      if (ls) ls.style.display = 'none';
    });
  </script>
</body>
</html>
