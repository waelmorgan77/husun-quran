    const TOTAL_PAGES = 604;
    const surahForPage = (page) => {
      for (let i = SURAHS.length - 1; i >= 0; i--) {

    };

    // ===== Constants =====

    ];
    const amountLabel = (key) => AMOUNT_OPTIONS.find((a) => a.key === key)?.label || 'حزب';
    const STORAGE_KEY = 'husun_quran_data_v2';

    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const dateKeyOf = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const arabicDate = (dateStr) => {
      const d = new Date(dateStr);
      return `${AR_DAYS[d.getDay()]}، ${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    };
    const startOfWeek = (date) => {
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day + 1) % 7;
      d.setDate(d.getDate() - diff);
      d.setHours(0, 0, 0, 0);
      return d;
    };

    const loadData = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (!parsed.settings.amounts) {
            parsed.settings.amounts = { reading_continuous: 'two_juz', listening_methodical: 'hezb' };
          }
          if (parsed.settings.preparation_enabled === undefined) {
            parsed.settings.preparation_enabled = true;
          }
          return parsed;
        }
      } catch (e) {}
      return {
        plan: { daily_pages: 1, start_page: 2, end_page: 604, rest_days: [5], start_date: todayKey() },
        settings: {
          dark_mode: false,
          targets: { ...DEFAULT_TARGETS },
          far_review: { active_days: [6], page_cap: 40 },
          near_review_pages: 20,
          amounts: { reading_continuous: 'two_juz', listening_methodical: 'hezb' },
          preparation_enabled: true,
        },
        logs: {},
      };
    };
    const saveData = (data) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {} };

    const pagesMemorizedBy = (plan, dateStr) => {
      const start = new Date(plan.start_date);
      const target = new Date(dateStr);
      if (target < start) return 0;
      let pages = 0;
      const cur = new Date(start);
      while (cur <= target) {
        if (!plan.rest_days.includes(cur.getDay())) pages += plan.daily_pages;
        cur.setDate(cur.getDate() + 1);
      }
      return pages;
    };
    const pagesForDate = (plan, dateStr) => {
      const d = new Date(dateStr);
      if (plan.rest_days.includes(d.getDay())) return null;
      const before = pagesMemorizedBy(plan, dateKeyOf(new Date(d.getTime() - 86400000)));
      const todayStart = plan.start_page + before;
      const todayEnd = todayStart + plan.daily_pages - 1;
      return { from: todayStart, to: todayEnd, count: plan.daily_pages };
    };
    const nearReviewRange = (plan, dateStr, nearPages) => {
      const today = pagesForDate(plan, dateStr);
      if (!today) return null;
      const startPage = Math.max(plan.start_page, today.from - nearPages);
      const endPage = today.from - 1;
      if (endPage < startPage) return null;
      return { from: startPage, to: endPage };
    };
    const farReviewRange = (plan, dateStr, nearPages, cap) => {
      const memorizedTotalBefore = Math.floor(pagesMemorizedBy(plan, dateKeyOf(new Date(new Date(dateStr).getTime() - 86400000))));
      const lastMemorizedPage = plan.start_page + memorizedTotalBefore - 1;
      const farEnd = lastMemorizedPage - nearPages;
      if (farEnd < plan.start_page) return null;
      const farStart = Math.max(plan.start_page, farEnd - cap + 1);
      return { from: farStart, to: farEnd };
    };
